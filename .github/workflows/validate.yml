name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  decide-runner:
    uses: martinopedal/github-runners-alz-corp-cookbook/.github/workflows/decide-runner.yml@v1
    with:
      self-hosted-labels: '["self-hosted", "personal", "pub", "linux"]'

  terraform:
    needs: decide-runner
    name: Terraform
    runs-on: ${{ fromJSON(needs.decide-runner.outputs.runner-labels) }}
    strategy:
      fail-fast: false
      matrix:
        path:
          - .
          - examples/personal-runners
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: 1.13.1

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ matrix.path }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ matrix.path }}
        run: terraform validate

  tflint:
    needs: decide-runner
    name: TFLint
    runs-on: ${{ fromJSON(needs.decide-runner.outputs.runner-labels) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93
        with:
          tflint_version: v0.62.0

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --format compact
